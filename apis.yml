apis:
  - name: Ivalua Procurement REST API
    description: >-
      The Ivalua REST API provides programmatic access to the full source-to-pay
      procurement lifecycle, including supplier registration and onboarding,
      contract creation and management, sourcing event orchestration, purchase
      requisitions and orders, invoice processing and AP automation, and
      procurement spend analytics. Built on a Service Oriented Architecture
      using open standard protocols, the API enables integration with ERP
      systems and third-party services via JSON and XML data exchange over
      secure HTTPS connections.
