name: Ivalua
description: >-
  Ivalua is an enterprise AI-powered procurement platform offering a unified
  source-to-pay solution that enables organizations to manage all categories of
  spend and suppliers. The platform exposes a REST API built on open standards,
  supporting JSON and XML data formats via secure web services, enabling
  programmatic integration for supplier onboarding, contract lifecycle
  management, sourcing events, purchase orders, invoice automation, and spend
  analytics. Ivalua's Enterprise Application Interface (EAI) module combines
  APIs, ETL, and query tools to orchestrate data transfer between Ivalua and
  external enterprise systems including SAP, Oracle, and Microsoft Dynamics.
  The Integration Hub supports 60+ ERP and enterprise system connectors,
  providing developer tooling to build and discover APIs without requiring
  middleware. Authentication leverages SAML-based SSO and two-factor
  authentication, with raw interface request/response logging available through
  the Integration Console for audit and debugging purposes.
